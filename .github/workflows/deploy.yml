name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Base TF for Export
        run: |
          pip install "tensorflow>=2.16.1" "keras>=3.0.0" numpy Pillow
      
      - name: Prep Model
        run: |
          python scripts/export_saved_model.py --input Digit_Recognizer.keras --output temp_saved_model

      - name: Install TFJS
        run: |
          pip install tensorflowjs
          pip install --upgrade protobuf

      - name: Convert Model to TFJS
        run: |
          mkdir -p docs/model
          tensorflowjs_converter --input_format=tf_saved_model --output_format=tfjs_graph_model --signature_name=serving_default --saved_model_tags=serve temp_saved_model docs/model


      - name: Verify Model Exists
        run: |
          ls -la docs/model

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
